<text class="card-text" x="80" y="340" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">BTC·ETH CME 포지셔닝, 레버리지드머니 순매도 흐름 지속 CFTC COT 자료에 따르면 BTC</text>
<text class="card-text" x="80" y="378" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">CME 레버리지드머니는 롱 4,015계약, 숏 11,506계약으로 순매도 -7,491계약(전체</text>
<text class="card-label" x="80" y="420" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24" font-weight="700">주의할 점</text>
<text class="card-text" x="80" y="460" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">확인 소스: CFTC COT · BTC CME 레버리지드머니 순매도가 현재 -7,491계약(전체</text>
<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">미결제약정의 -38.6%)에서 추가 확대되면 하방 압력 우위 관찰, 축소·순매수 전환되면 숏 커버링</text>
<text class="card-disclaimer" x="80" y="555" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="22">정보 제공용 시황 카드</text>
