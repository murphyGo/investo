<text class="card-text" x="80" y="340" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">BTC·ETH — CFTC COT 포지셔닝, 가격 반등에도 레버리지 자금은 순매도 우위 BTC는 UTC</text>
<text class="card-text" x="80" y="378" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">24h 구간에서 +0.54% 오른 $64,204.00을 기록해 지난 7월 3일 브리핑에서 언급된</text>
<text class="card-label" x="80" y="420" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24" font-weight="700">주의할 점</text>
<text class="card-text" x="80" y="460" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">확인 소스: CFTC COT 보고서 · BTC 레버리지 자금 순포지션(현재 -29.0%,</text>
<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">-5,313계약)이 축소되며 순매도 규모가 줄어들면 상방 압력 관찰, 순매도 규모가 더 확대되면 하방</text>
<text class="card-disclaimer" x="80" y="555" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="22">정보 제공용 시황 카드</text>
