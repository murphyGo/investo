<text class="card-text" x="80" y="220" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">BTC-USD는 $80,561.33에 거래되며 5월 11일 종가 $81,154 대비 소폭 하락한 채</text>
