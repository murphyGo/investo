<text class="card-text" x="80" y="220" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">UTC 24h 기준(2026-05-26 스냅샷) BTC는 -1.84% 하락한 $75,772.00,</text>
<text class="card-text" x="80" y="258" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">ETH(이더리움)는 -1.69% 하락한 $2,070.56, SOL(솔라나)은 -1.55% 하락한</text>
