<text class="card-text" x="80" y="220" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">2026-06-12 UTC(협정세계시) 24h 스냅샷 기준, 크립토 전체 시총은 $2.26T(+0.64%</text>
<text class="card-text" x="80" y="258" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">24h)로 소폭 반등세를 이어가고 있다. [데이터부족]</text>
