<text class="card-text" x="80" y="340" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">BTC 시장 심리 — Extreme Fear 속 전체 시총 소폭 반등 지속 UTC 24h 스냅샷 기준</text>
<text class="card-text" x="80" y="378" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">크립토 전체 시총은 $2.26T(+0.64%)로 소폭 반등을 이어가고 있다.</text>
<text class="card-label" x="80" y="420" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24" font-weight="700">주의할 점</text>
<text class="card-text" x="80" y="460" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">확인 소스: 하원 금융서비스위원회 · CLARITY Act 마크업 심의 — 법안 심의가 예정대로 진행되면</text>
<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">미국 내 크립토 자산 시장 구조 법제화 속도 가속 흐름 관찰, 심의가 지연·보류되면 단기 규제 불확실성</text>
<text class="card-disclaimer" x="80" y="555" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="22">정보 제공용 시황 카드</text>
