<text class="card-text" x="80" y="220" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">6월 CPI(소비자물가지수) 상승률이 시장 예상을 하회했다는 소식에 뉴욕증시 3대 지수가 동반 상승했고,</text>
