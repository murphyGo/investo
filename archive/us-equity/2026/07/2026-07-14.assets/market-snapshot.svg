<text class="card-text" x="80" y="460" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">확인 소스: FOMC 캘린더 · 이번 주(오늘7/16) Warsh 의장 증언(7/14, 7/15),</text>
<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">Cook·Barr·Bowman 발언, Jefferson 연설(7/16), Beige Book(베이지북,</text>
<text class="card-disclaimer" x="80" y="555" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="22">정보 제공용 시황 카드</text>
