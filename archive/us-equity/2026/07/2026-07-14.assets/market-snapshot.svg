<text class="card-text" x="80" y="378" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">S&amp;P 500 Index($SPX)는 +0.30%, 다우존스산업평균지수(다우, $DOWI)는</text>
