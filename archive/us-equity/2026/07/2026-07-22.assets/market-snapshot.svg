<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">Earnings&quot; · GOOGL(알파벳) EPS 전망 $2.87 — 실적이 전망치를 상회해 발표되면</text>
