<text class="card-text" x="80" y="378" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">CFTC(미국 상품선물거래위원회) COT(선물포지션 보고서) 관련 포지셔닝 흐름이 이어지는 가운데, 오늘</text>
