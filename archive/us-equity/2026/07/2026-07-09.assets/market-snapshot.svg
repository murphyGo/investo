<text class="card-title" x="80" y="118" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="48" font-weight="700">미국 증시 시장 스냅샷</text>
<text class="card-subtitle" x="80" y="158" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24">2026-07-09 · 데이터 limited</text>
<text class="card-label" x="80" y="180" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24" font-weight="700">오늘의 결론</text>
<text class="card-text" x="80" y="220" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">미국 증시는 반도체 업종 강세에 힘입어 지난 거래일 마감 기준 S&amp;P 500(스탠더드앤드푸어스 500</text>
<text class="card-text" x="80" y="258" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">지수)이 +0.81%, 나스닥 100 지수가 +1.62% 상승했고, 오늘 장중에도 S&amp;P 500</text>
<text class="card-label" x="80" y="300" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24" font-weight="700">핵심 동인</text>
<text class="card-text" x="80" y="340" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">반도체 강세 속 3대 지수 동반 상승 지난 거래일(목요일, 현지시간) 마감 기준 S&amp;P 500($SPX,</text>
<text class="card-text" x="80" y="378" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">SPY)은 +0.81%, 다우존스 산업평균지수(DJIA, $DOWI, DIA)는 +0.27%, 나스닥</text>
<text class="card-label" x="80" y="420" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="24" font-weight="700">주의할 점</text>
<text class="card-text" x="80" y="460" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">확인 소스: FRED · DFF(연방기금금리 실효치) — 현재 3.62에서 추가 하락하면 통화완화 기대</text>
<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">강화 흐름을 관찰할 수 있고, 전일 수준인 3.63으로 되돌아가면 긴축 유지 신호를 점검할 수 있다.</text>
<text class="card-disclaimer" x="80" y="555" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="22">정보 제공용 시황 카드</text>
