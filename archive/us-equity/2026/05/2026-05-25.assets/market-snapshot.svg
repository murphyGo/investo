<text class="card-text" x="80" y="498" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="32">경제&quot; 발언 및 Cook 이사의 AI·경제 연설에서 통화정책 방향 단서를 추세 확인 (관심 영향: 금리</text>
<text class="card-disclaimer" x="80" y="555" font-family="&quot;Noto Sans KR&quot;, Arial, sans-serif" font-size="22">정보 제공용 시황 카드</text>
