# MkDocs configuration for Investo public site (FR-003, US-003).
#
# Reads from ``site_docs/`` (NOT ``docs/``, which holds AIDLC
# documentation that is intentionally out of public render). The
# ``archive/`` directory at the repo root is exposed under
# ``site_docs/archive/`` via a tracked symlink, so the daily-briefing
# bot's ``archive/YYYY/MM/YYYY-MM-DD.md`` writes are picked up by
# mkdocs without any post-process step.
#
# Built by ``.github/workflows/pages.yml`` with ``mkdocs build
# --strict`` (FR-006 quality gate).

site_name: Investo — 데일리 시황
site_description: 매일 KST 07:00 (평일) / 09:00 (토)에 자동 게시되는 한국어 미국 주식·크립토 시황.
site_author: hyunseung.kim
# ``site_url`` is the canonical production URL; fork/staging deploys can
# override via ``mkdocs build --site-url ...`` or env-injection. The
# ``overrides/main.html`` partial composes ``{{ config.site_url }}{{
# config.extra.og_image_path }}`` to emit an absolute ``og:image`` URL,
# which Telegram / Slack / Twitter / LinkedIn unfurlers all require.
site_url: https://murphygo.github.io/investo/

docs_dir: site_docs
# ``site/`` is mkdocs' default build output and is gitignored —
# pages.yml uploads it as the Pages artifact.

repo_url: https://github.com/murphyGo/investo
repo_name: murphyGo/investo
edit_uri: edit/main/site_docs/

theme:
  name: material
  language: ko
  # u29 site-discovery-v2: ``custom_dir`` lets the project drop in a
  # minimal partial override that adds an OG image ``<meta>`` tag to
  # every page. The override file lives at
  # ``site_docs/overrides/main.html`` and extends mkdocs-material's
  # default base template.
  custom_dir: overrides
  features:
    # Tabs across the top bar — kept minimal (Home / About / Archive).
    - navigation.tabs
    - navigation.tabs.sticky
    # Fold long sections in the sidebar so the archive index doesn't
    # explode after months of accumulated daily briefings.
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    # ``content.code.copy`` is unused today (no code blocks in
    # briefings), but markdown plugins that future briefings might
    # introduce (snippets, etc.) benefit from it.
    - content.code.copy
  palette:
    # Light / dark scheme toggle.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono

# Top-level nav. Per-day briefings under ``archive/`` are auto-
# discovered by mkdocs (any markdown file under ``docs_dir`` is
# rendered at its corresponding URL even when not explicitly listed in
# nav). The ``Archive`` entry points at the symlinked ``archive/``
# directory's index page; mkdocs surfaces the YYYY/MM hierarchy in
# the sidebar automatically.
nav:
  - Home: index.md
  - About: about.md
  - 데이터 품질: quality.md
  - Archive:
      # Point at the index file directly; mkdocs picks up additional
      # files under the same directory (the daily-briefing bot's
      # ``archive/YYYY/MM/YYYY-MM-DD.md`` writes) and auto-groups them
      # in the sidebar under this section. The explicit ``index.md``
      # entry keeps ``--strict`` happy when only the index exists
      # (i.e. before the first cron fire).
      - 최신: archive/index.md
      # u29 site-discovery-v2: explicit per-segment entry points in
      # the top nav so persona #2 (weekend retrospect) does not have
      # to drill into ``archive/`` before discovering the segmentation.
      # Each ``archive/{segment}/index.md`` is auto-generated by the
      # publisher (``investo.publisher.site_index.update_segment_archive_index``)
      # so the file always lists the latest publish at the top.
      - 국내 증시: archive/domestic-equity/index.md
      - 미국 증시: archive/us-equity/index.md
      - 크립토: archive/crypto/index.md
      - 주차별 회고: archive/weekly/index.md

markdown_extensions:
  # Better tables, footnotes, fenced code, attr_list — pinned for
  # round-trip stability between the daily-briefing markdown and the
  # rendered HTML.
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences

plugins:
  # Built-in search; the Korean tokenization in mkdocs-material >= 9.5
  # is the reason we pinned that floor in pyproject.
  - search:
      lang:
        - ko
        - en

extra:
  # u38 og-card-png-twin: OG image meta. The PNG primary and SVG
  # secure-url twin are rewritten
  # by the publisher each segmented run (see
  # ``investo.visuals.og_card.write_og_card``) so social link previews
  # always pick up today's hero card. Path is site-relative — mkdocs
  # rewrites it to the deployed URL via the ``main.html`` override.
  og_image_path: assets/og-card.png
  og_image_svg_path: assets/og-card.svg

extra_css:
  - assets/u29.css

# Strict mode is enabled at the CLI level (``mkdocs build --strict``)
# in ``pages.yml``. We do NOT set ``strict: true`` here so that local
# preview (``uv run mkdocs serve``) tolerates work-in-progress drafts.
