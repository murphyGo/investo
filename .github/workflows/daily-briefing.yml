# Daily briefing pipeline (US-005, FR-005).
#
# This workflow is the cron entrypoint for ``python -m investo``. It
# runs twice on weekdays + once on Saturday, mapping KST market-close
# observation times to UTC. KST has been a fixed UTC+9 since 1988
# (no DST), so these cron times are stable year-round even though the
# US trading-day session moves ±1 hour twice a year via US DST.
#
# **Schedule** (UTC; mapping shown alongside)
#
#   '0 22 * * 0,1,2,3,4'   # UTC Sun..Thu 22:00 = KST Mon..Fri 07:00
#   '0 0  * * 6'           # UTC Sat       00:00 = KST Sat       09:00
#
# The first cron fires for the prior US trading session (US Mon close →
# KST Tue 07:00 fire; US Fri close → KST Sat 09:00 fire). Date
# resolution to the actual ``target_date`` happens inside
# ``investo.orchestrator.date_resolution.resolve_target_date`` per
# AC-005-1 / AC-005-2.
#
# **Manual trigger**: ``workflow_dispatch`` exposes an optional
# ``target_date`` input (ISO-8601 YYYY-MM-DD). Useful for backfills +
# US-public-holiday recoveries (per Q3=A: holiday days surface as
# empty-collect → operator alert; the operator re-triggers manually
# with ``target_date=last-trading-day``).
#
# **Timeout** (AC-001-4): ``timeout-minutes: 240``. Total design budget
# remains much lower under normal conditions, but the job-level ceiling
# is intentionally generous after 2026-05-18/21 cron runs showed slow
# crypto Stage 2 synthesis can consume the old 15-minute per-call ceiling
# before publish/notify. Segment generation still owns tighter per-segment
# timeouts/retry policy so a slow segment can degrade to PARTIAL instead
# of blocking Telegram delivery.
#
# **Permissions**: ``contents: write`` for the inner
# ``commit_and_push`` to ``archive/YYYY/MM/YYYY-MM-DD.md`` and
# ``actions: write`` to dispatch ``pages.yml`` after a successful
# briefing run. GitHub suppresses push-triggered workflows from commits
# made with ``GITHUB_TOKEN``, so the pages build is chained explicitly
# via ``workflow_dispatch``.
#
# **Secrets** (AC-007-1; 5 required + 4 optional, all GitHub Secrets):
#
#   CLAUDE_CODE_OAUTH_TOKEN     -- consumed by the ``claude`` CLI
#                                 subprocess; not read by Python
#   TELEGRAM_BOT_TOKEN          -- bot identity; both dispatchers share
#   TELEGRAM_BRIEFING_CHANNEL_ID -- public channel (FR-004)
#   TELEGRAM_OPERATOR_CHAT_ID    -- operator 1:1 chat (FR-007)
#                                  MUST be disjoint from CHANNEL_ID
#                                  (CLAUDE.md #5; enforced inside
#                                  ``__main__._validate_env``)
#   SITE_URL_BASE                -- public mkdocs site base URL
#                                  (e.g. https://owner.github.io/investo)
#   FRED_API_KEY (optional)      -- u1 sources extension 2026-05-01;
#                                  required for the ``fred-macro``
#                                  adapter only. Absent → that
#                                  adapter raises SourceFetchError
#                                  per FD R13; other adapters
#                                  unaffected (FD R6 graceful
#                                  degradation). Free key from
#                                  https://fred.stlouisfed.org/.
#
# **Exit code / Pages sequencing**:
#   0 = complete public content, including notifier-only PARTIAL
#   1 = no public commit / FAILED
#   2 = committed one/two-segment content-partial publication
# The pipeline step captures rc without stopping the job. Pages runs only
# when ``publication_committed=true``; the final step then re-emits rc 1/2.

name: daily-briefing

on:
  schedule:
    # KST Mon..Fri 07:00 (UTC Sun..Thu 22:00)
    - cron: '0 22 * * 0,1,2,3,4'
    # KST Sat 09:00 (UTC Sat 00:00)
    - cron: '0 0 * * 6'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override target_date (YYYY-MM-DD). Leave blank for the cron default (resolve_target_date(now_utc)).'
        required: false
        type: string

# Concurrency: a manual ``workflow_dispatch`` while the cron fire is
# still running would race for the same archive path + try a parallel
# git push. Serialize per branch.
concurrency:
  group: daily-briefing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  briefing:
    name: Generate + publish + notify
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      actions: write
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Full lineage so the inner ``git push`` rebases cleanly.
          fetch-depth: 0
          # Use the workflow's GITHUB_TOKEN for the commit author +
          # subsequent push. ``persist-credentials: true`` (default)
          # leaves the token in the local clone for the push step.

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # Pinned floor for the cache-key behavior we rely on; bump
          # alongside local dev environment.
          version: '>=0.4'
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install OG card raster dependencies
        # CairoSVG's svg2png preflight needs the runtime Cairo shared
        # library only; build headers are not required in the GHA job.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install project (runtime only)
        # Runtime deps are enough for ``python -m investo``. Test and
        # docs tooling run in separate jobs.
        run: uv sync --no-dev

      - name: Preflight OG card PNG conversion
        run: >
          uv run python -c "import cairosvg;
          cairosvg.svg2png(bytestring=b'<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"1\" height=\"1\"/>')"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .github/workflows/daily-briefing.yml

      - name: Install Claude Code CLI
        # Claude Code is distributed as an npm package and requires
        # Node.js 18+. setup-node enables npm cache without adding
        # secrets or paid services.
        run: |
          node --version
          npm --version
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Configure git author for the bot commit
        run: |
          git config user.name 'Investo Bot'
          git config user.email '${{ github.actor_id }}+investo-bot@users.noreply.github.com'

      - name: Preflight required secrets
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BRIEFING_CHANNEL_ID: ${{ secrets.TELEGRAM_BRIEFING_CHANNEL_ID }}
          TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
          SITE_URL_BASE: ${{ secrets.SITE_URL_BASE }}
          # u27 cost guard: the preflight script accepts an optional
          # ``OPENAI_API_KEY`` and only requires it when
          # ``INVESTO_OPENAI_VISUALS=1``. The workflow forces the flag
          # to ``"0"`` below, so the key is treated as optional during
          # preflight even if the secret happens to be present.
          INVESTO_OPENAI_VISUALS: '0'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/check_daily_briefing_env.py

      - name: Resolve weekly publish flags
        # DEBT-059: derive the weekly opt-in from the scheduled run's
        # KST wall-clock intent instead of comparing the exact cron
        # string. Manual workflow_dispatch remains opt-out by default.
        run: python scripts/resolve_weekly_flags.py

      - name: Run pipeline (python -m investo)
        id: pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BRIEFING_CHANNEL_ID: ${{ secrets.TELEGRAM_BRIEFING_CHANNEL_ID }}
          TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
          SITE_URL_BASE: ${{ secrets.SITE_URL_BASE }}
          # Manual target_date override (empty string when cron fires
          # → orchestrator's ``resolve_target_date(now_utc)`` runs).
          # The orchestrator reads INVESTO_TARGET_DATE if set;
          # otherwise resolves from now. Wired this way so the
          # workflow_dispatch input flows in without changing
          # __main__'s positional API.
          INVESTO_TARGET_DATE: ${{ inputs.target_date }}
          # u1 sources extension 2026-05-01: optional FRED API key for
          # the ``fred-macro`` adapter. Absent secret → empty string at
          # runtime → ``FredMacroAdapter.fetch`` raises
          # ``SourceFetchError(transient=False)`` per FD R13 and the
          # aggregator's R6 catches it; the ``fred-macro`` adapter
          # contributes ``[]`` and other adapters run normally. Set
          # this secret only when you want macro coverage in the
          # briefing.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # u36 source-expansion-bundles 2026-05-08: data.go.kr public
          # API service key for the ``fsc-krx-index-price`` and
          # ``fsc-krx-stock-price`` adapters (FSC OpenAPI proxied via
          # apis.data.go.kr). Either name works (the adapter checks
          # ``INVESTO_KRX_SERVICE_KEY`` first, then
          # ``INVESTO_DATA_GO_KR_SERVICE_KEY`` as fallback). Absent
          # secret → adapters raise SourceFetchError(transient=False)
          # and aggregator R6 catches it; KRX-segment coverage drops to
          # ``insufficient`` cleanly.
          INVESTO_KRX_SERVICE_KEY: ${{ secrets.INVESTO_KRX_SERVICE_KEY }}
          INVESTO_DATA_GO_KR_SERVICE_KEY: ${{ secrets.INVESTO_DATA_GO_KR_SERVICE_KEY }}
          # u41 dart-disclosure-adapter (planned, awaiting fixture
          # session): OpenDART REST API key for Korean equity disclosure
          # ingestion. Wired through the env now so the adapter lights
          # up the moment u41 lands. Absent secret → adapter not yet
          # registered, no effect.
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          # u19 visual assets: opt in to fetching externally hosted
          # images only when each item carries a complete license
          # manifest. Missing/invalid manifests still fall back to AI
          # image generation or deterministic SVG cards.
          INVESTO_EXTERNAL_IMAGE_ASSETS: '1'
          # u27 cost guard (CLAUDE.md #4 — "free APIs only" enforced at
          # the code level): force the OpenAI visual surface
          # **disabled** by default, regardless of whether
          # ``OPENAI_API_KEY`` happens to be set as a repository
          # secret. ``visuals.openai_image.load_openai_visual_config``
          # only enables the surface when this flag is exactly
          # ``"1"``; ``__main__._validate_env`` requires the API key
          # only under that opt-in. To experiment with the cost-bearing
          # surface manually, change this to ``'1'`` AND set the
          # ``OPENAI_API_KEY`` secret — both must be present or the
          # pipeline fails closed at boot.
          INVESTO_OPENAI_VISUALS: '0'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # u31 Step 2 — operator state directory. The boot-alert dedup
          # ledger and per-source coverage time series both land under
          # this directory; pinning it explicitly makes the GHA cache
          # key match the path the workflow restores below.
          INVESTO_OPERATOR_STATE_DIR: archive/_meta/operator_state
        run: |
          set +e
          uv run python -m investo
          pipeline_rc=$?
          echo "process_exit_code=$pipeline_rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Trigger Pages deploy
        if: steps.pipeline.outputs.publication_committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref "$GITHUB_REF_NAME"

      - name: Re-emit pipeline exit code
        if: always()
        env:
          PIPELINE_RC: ${{ steps.pipeline.outputs.process_exit_code }}
        run: |
          case "$PIPELINE_RC" in
            0) exit 0 ;;
            1|2) exit "$PIPELINE_RC" ;;
            *) echo "Invalid or missing pipeline exit code" >&2; exit 1 ;;
          esac
